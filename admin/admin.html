<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Administrador</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-login" id="adminLogin">
        <h2>Acceso a Consola de Administrador</h2>
        <form id="loginForm">
            <input type="password" id="adminCode" placeholder="Código de acceso" required>
            <button type="button" id="togglePass" style="margin-left:5px;padding:6px 10px;font-size:13px;">👁️</button><br>
            <input type="email" id="adminEmail" placeholder="Correo electrónico" required><br>
            <button type="submit">Entrar</button>
        </form>
        <p id="loginError" class="error"></p>
    </div>
    <div class="admin-panel" id="adminPanel" style="display:none;">
        <h2>Consola de Administrador</h2>
        <p>¡Cuidado! Puedes modificar toda la página principal.</p>
        <label>Título principal:<br><input type="text" id="mainTitle"></label><br>
        <label>Descripción:<br><input type="text" id="mainDesc"></label><br>
        <label>Noticia 1:<br><input type="text" id="news1"></label><br>
        <label>Noticia 2:<br><input type="text" id="news2"></label><br>
        <button id="saveBtn">Guardar cambios</button>
        <p id="saveMsg"></p>
    </div>
    <script src="admin.js"></script>
</body>
</html>
