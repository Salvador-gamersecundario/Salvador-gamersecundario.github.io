<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Administrador</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-login" id="adminLogin">
        <h2>Acceso a Consola de Administrador</h2>
        <form id="loginForm">
            <input type="password" id="adminCode" placeholder="Código de acceso" required>
            <button type="button" id="togglePass" style="margin-left:5px;padding:6px 10px;font-size:13px;">👁️</button><br>
            <input type="email" id="adminEmail" placeholder="Correo electrónico" required><br>
            <button type="submit">Entrar</button>
        </form>
        <p id="loginError" class="error"></p>
    </div>
    <div class="admin-panel" id="adminPanel" style="display:none;">
        <div id="visualEditorContainer" style="display:flex;">
            <aside id="toolMenu" style="width:200px;background:#222;color:#fff;padding:10px;">
                <h3>Herramientas</h3>
                <button class="tool-btn" data-tool="text">Texto</button>
                <button class="tool-btn" data-tool="image">Imagen</button>
                <button class="tool-btn" data-tool="button">Botón</button>
                <button class="tool-btn" data-tool="section">Sección</button>
                <hr>
                <button id="saveVisualBtn" style="background:#4caf50;color:#fff;width:100%;">Guardar Cambios</button>
                <p id="saveMsg"></p>
            </aside>
            <main id="visualEditor" style="flex:1;background:#f4f4f4;min-height:600px;padding:20px;">
                <h2>Editor Visual</h2>
                <div style="display:flex;gap:20px;align-items:flex-start;">
                    <div style="flex:1;">
                        <div id="editableArea" contenteditable="true" style="border:2px dashed #888;min-height:400px;padding:20px;background:#fff;">
                            <!-- Aquí se cargará el contenido editable de index.html -->
                        </div>
                    </div>
                    <div style="flex:1;">
                        <h4>Vista previa en tiempo real</h4>
                        <iframe id="livePreview" src="../index.html" style="width:100%;height:400px;border:1px solid #aaa;background:#fff;"></iframe>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
