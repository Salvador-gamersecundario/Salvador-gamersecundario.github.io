<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>MDL - Comunidad Gaming</title>
                <link rel="stylesheet" href="style.css">
                    
                        <!-- Google AdSense -->
                         <meta name="google-adsense-account" content="ca-pub-4916505037680803">
                            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4916505037680803"
                                 crossorigin="anonymous"></script>
                                 </head>
                                 <body>
                                     <header>
                                             <h1>Bienvenido a MDL</h1>
                                                     <p>Un lugar donde la comunidad gamer se une.</p>
                                                             <button id="themeToggle">🌙 Cambiar Tema</button>
                                                                 </header>
                                                                     
                                                                         <main>
                                                                                 <button id="joinBtn">Únete a MDL</button>
                                                                                     </main>

                                                                                         <section id="news">
                                                                                                 <h2>Últimas Noticias</h2>
                                                                                                         <div class="news-item">🎮 ¡Nuevo torneo de Minecraft este fin de semana!</div>
                                                                                                                 <div class="news-item">🔥 Se ha actualizado el servidor con nuevos plugins.</div>
                                                                                                                     </section>
                                                                                                                         <footer>
                                                                                                                                <h3>🚘Síguenos en redes</h3>
                                                                                                                                    <a href="https://discord.gg/pA4PGb3EUR" target="_blank" class="discord-btn">Únete a nuestro Discord</a>

                                                                                                                                        <!-- Imagen al final -->
                                                                                                                                            <div class="image-container">
                                                                                                                                                    <img src="asset/ING/chamito.png" alt="Chamito" class="final-image" >
                                                                                                                                                        </div>
                                                                                                                                                        </footer>
                                                                                                                                                        
    <!-- Menú hamburguesa para admin -->
    <div id="menuHamburguesa" style="position:fixed;top:20px;right:20px;z-index:1000;">
        <button id="openMenu" style="background:none;border:none;font-size:30px;color:#fff;cursor:pointer;">&#8942;</button>
        <div id="menuOpciones" style="display:none;position:absolute;right:0;top:40px;background:#232526cc;padding:10px 20px;border-radius:8px;box-shadow:0 2px 8px #0006;">
            <a href="/admin/admin.html" style="color:#fff;text-decoration:none;display:block;">Panel de administrador</a>
        </div>
    </div>
    
                                                                                                                                                 <script src="script.js"></script>
                                                                                                                                                <script>
    // Menú hamburguesa
    const openMenu = document.getElementById('openMenu');
    const menuOpciones = document.getElementById('menuOpciones');
    openMenu.addEventListener('click', () => {
        menuOpciones.style.display = menuOpciones.style.display === 'block' ? 'none' : 'block';
    });
    document.addEventListener('click', (e) => {
        if (!openMenu.contains(e.target) && !menuOpciones.contains(e.target)) {
            menuOpciones.style.display = 'none';
        }
    });
    </script>
                                                                                                                                                 </body>
                                                                                                                                                 </html>
